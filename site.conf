{
  -- Used for generated hostnames, e.g. freifunk-abcdef123456. (optional)
  hostname_prefix = 'oni-',

  -- Name of the community.
  site_name = 'Opennet Initiative e.V.',

  -- Shorthand of the community.
  site_code = 'oni',

  -- 32 bytes of random data, encoded in hexadecimal
  -- This data must be unique among all sites and domains!
  -- Can be generated using: echo $(hexdump -v -n 32 -e '1/1 "%02x"' </dev/urandom)
  domain_seed = '0c405d4e53ff0cb718ec7b6e426ae95ebab3faab6af52fc64a9e8984a083512a',

  -- Prefixes used within the mesh.
  -- prefix6 is required, prefix4 can be omitted if next_node.ip4
  -- is not set.
  prefix4 = '10.200.0.0/16',
  prefix6 = 'fd32:d8d3:87da:1000::/64',

  -- Timezone of your community.
  -- See https://openwrt.org/docs/guide-user/base-system/system_configuration#time_zones
  timezone = 'CET-1CEST,M3.5.0,M10.5.0/3',

  -- List of NTP servers in your community.
  -- Must be reachable using IPv6!
  ntp_servers = {
    '0.openwrt.pool.ntp.org',
    '1.openwrt.pool.ntp.org',
    '2.openwrt.pool.ntp.org',
    '3.openwrt.pool.ntp.org',
  },

  -- Wireless regulatory domain of your community.
  regdom = 'DE',

  -- Wireless configuration for 2.4 GHz interfaces.
  wifi24 = {
    -- Wireless channel.
    channel = 1,

    -- ESSIDs used for client network.
    ap = {
      ssid = 'opennet-initiative.de',
    },

    mesh = {
      id = 's6aNsdxwX',
      mcast_rate = 12000,
    },
  },

  wifi5 = {
    channel = 44,
    outdoor_chanlist = '100 104 108 112 120 124 132 136 140',
    ap = {
      ssid = 'opennet-initiative.de',
    },
    mesh = {
      id = 's6aNsdxwX',
      mcast_rate = 12000,
    },
  },

  mesh = {
    vxlan = true,
    batman_adv = {
      routing_algo = 'BATMAN_IV',
    },
  },

  -- The next node feature allows clients to always reach the node it is
  -- connected to using a known IP address.
  next_node = {
    name = {
        'meinrouter.lan',
        'myrouter.lan',
    },
    ip4 = '10.200.255.254',
    ip6 = 'fd32:d8d3:87da:1000::fffe',
  },

  mesh_vpn = {
    enabled = true,

    fastd = {
      -- Refer to https://fastd.readthedocs.io/en/latest/ to better understand
      -- what these options do.

      -- List of crypto-methods to use.
      methods = {'salsa2012+umac'},
      mtu = 1312,
      configurable = true,

      groups = {
        backbone = {
          -- Limit number of connected peers to reduce bandwidth.
          limit = 2,

          -- List of peers.
          peers = {
            h2901140 = {
              key = '35b35806255d971aa17afa60aa4f3d90f00c4c279835c277ec76af1a52e966fb',

              remotes = { '"h2901140.stratoserver.net" port 20001' },
            },
            gai = {
              key = '30a7e43e9a7eafab7c041f14e4a4099e7fdfbf768a9dd73eefe668d991b14de2',

              remotes = { '"192.168.0.245" port 1705',
                          'ipv4 "gai.on" port 1705',
                          '"gai.opennet-initiative.de" port 1705' },
            },
          },
        },
      },
    },

    bandwidth_limit = {
      -- The bandwidth limit can be enabled by default here.
      enabled = false,

      -- Default upload limit (kbit/s).
      egress = 200,

      -- Default download limit (kbit/s).
      ingress = 3000,
    },
  },

  autoupdater = {
    -- Default branch (optional), can be overridden by setting GLUON_AUTOUPDATER_BRANCH when building.
    -- Set GLUON_AUTOUPDATER_ENABLED to enable the autoupdater by default for newly installed nodes.
    branch = 'stable',

    -- List of branches. You may define multiple branches.
    branches = {
      stable = {
        name = 'stable',

        -- List of mirrors to fetch images from. IPv6 required!
        mirrors = {
          'https://downloads.opennet-initiative.de/gluon/oni-testing/images/sysupgrade',

          'http://[fd32:d8d3:87da:1000:ba27:ebff:fe84:2294]/gluon/images/sysupgrade',
        },

        -- Number of good signatures required.
        -- Have multiple maintainers sign your build and only
        -- accept it when a sufficient number of them have
        -- signed it.
        good_signatures = 1,

        -- List of public keys of maintainers.
        pubkeys = {
          '9c0817b136949c985c71606268f1322ad82434cb6ec76c65ae1f21f8eb487f7c', -- builder
        },
      },
    },
  },

  authorized_keys = {
    'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHAPpPJyr1bh4GSUyPtkBx2KKnUAy26odRWMZX2Y37WI Christoph Kottke',
    'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDFbNANuafIzL5tshOZpBxMvvps2IvdEMjw5dLm74d41 Martin Garbe',
    'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBOwpJxc2nL+4if3eVYpQd36fKFWGmno7pzaxyR2NwFl openpgp:0x19DB84D5',
  },

  dns = {
    cacheentries = 5000,
    servers = {
      '2a0a:4580:1010:0002::1',
    },
  },

  config_mode = {
    remote_login = {
      show_password_form = true,
      min_password_length = 12,
    },
  },

  setup_mode = {
    skip = true,
  },

  opkg = {
    extra = {
      gluon = 'http://[fd32:d8d3:87da:1000:ba27:ebff:fe84:2294]/gluon/packages/gluon-%GS-%GR/%S',
    },
  },

  syslog = {
    ip = 'fd32:d8d3:87da:1000:ba27:ebff:fe84:2294',
  },
}
